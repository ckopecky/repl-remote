openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Synthetic GTM Signal Engine API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard summary
  - name: prospects
    description: Prospect list and detail
  - name: hypotheses
    description: Growth hypothesis versions
  - name: gtm-signals
    description: GTM Signal queue and Attio export
  - name: demo
    description: Demo data controls
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary metrics
      responses:
        "200":
          description: Summary metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /prospects:
    get:
      operationId: listProspects
      tags: [prospects]
      summary: List prospects with company, archetype, and scoring data
      parameters:
        - name: priority
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OutreachPriority"
        - name: archetype
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Archetype"
        - name: department
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GtmSignalStatus"
        - name: eventType
          in: query
          required: false
          description: Filter to prospects who have triggered at least one event of this type.
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum:
              [
                icpFitScore,
                activationScore,
                enterpriseIntentScore,
                churnRiskScore,
                outreachPriority,
                createdAt,
              ]
        - name: sortDir
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: List of prospects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProspectListItem"

  /prospects/{personId}:
    get:
      operationId: getProspectDetail
      tags: [prospects]
      summary: Get full prospect detail
      parameters:
        - name: personId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Prospect detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProspectDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /hypotheses:
    get:
      operationId: listHypotheses
      tags: [hypotheses]
      summary: List all growth hypothesis versions
      responses:
        "200":
          description: List of hypothesis versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrowthHypothesis"
    post:
      operationId: createHypothesis
      tags: [hypotheses]
      summary: Save a new growth hypothesis version and recalculate assessments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrowthHypothesisInput"
      responses:
        "201":
          description: Created hypothesis and recalculation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrowthHypothesisSaveResult"

  /hypotheses/current:
    get:
      operationId: getCurrentHypothesis
      tags: [hypotheses]
      summary: Get the currently effective growth hypothesis
      responses:
        "200":
          description: Current hypothesis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrowthHypothesis"

  /gtm-signals:
    get:
      operationId: listGtmSignals
      tags: [gtm-signals]
      summary: List GTM signals (queue)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GtmSignalStatus"
      responses:
        "200":
          description: List of GTM signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GtmSignalListItem"
    post:
      operationId: createGtmSignal
      tags: [gtm-signals]
      summary: Create a GTM signal for a high/medium priority prospect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GtmSignalInput"
      responses:
        "201":
          description: Created GTM signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GtmSignal"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gtm-signals/{id}:
    get:
      operationId: getGtmSignal
      tags: [gtm-signals]
      summary: Get a GTM signal by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: GTM signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GtmSignal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateGtmSignal
      tags: [gtm-signals]
      summary: Update the status of a GTM signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GtmSignalUpdate"
      responses:
        "200":
          description: Updated GTM signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GtmSignal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gtm-signals/{id}/attio-sync:
    post:
      operationId: syncGtmSignalToAttio
      tags: [gtm-signals]
      summary: >-
        Push this GTM signal's Company, Person, GTM Signal record, Generative AI
        Email record, and List entry to the connected Attio workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated GTM signal with sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GtmSignal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Attio sync failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GtmSignal"

  /gtm-signals/{id}/generate:
    post:
      operationId: generateGtmSignalContent
      tags: [gtm-signals]
      summary: >-
        Generate (or regenerate) this signal's outreach angle, research notes,
        and draft email using a real LLM call. Moves the signal to "Needs Review"
        on success and creates a new Generative AI Email row.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated GTM signal with generated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GtmSignal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GtmSignal"

  /gtm-signals/{id}/attio-export:
    get:
      operationId: getAttioExportPreview
      tags: [gtm-signals]
      summary: Get Attio-compatible export payload previews for a GTM signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attio export preview payloads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttioExportPreview"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /demo/archetypes:
    get:
      operationId: listArchetypes
      tags: [demo]
      summary: List available behavioral archetypes
      responses:
        "200":
          description: List of archetypes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArchetypeInfo"

  /demo/generate-prospect:
    post:
      operationId: generateProspect
      tags: [demo]
      summary: Generate one synthetic prospect by archetype
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateProspectInput"
      responses:
        "201":
          description: Generated prospect detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProspectDetail"

  /demo/generate-batch:
    post:
      operationId: generateBatch
      tags: [demo]
      summary: Generate a mixed batch of synthetic prospects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateBatchInput"
      responses:
        "201":
          description: Batch generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateBatchResult"

  /demo/reset:
    post:
      operationId: resetDemoData
      tags: [demo]
      summary: Reset all synthetic data using the fixed demo seed
      responses:
        "200":
          description: Dashboard summary after reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /demo/reseed:
    post:
      operationId: reseedDemoData
      tags: [demo]
      summary: Regenerate all synthetic data using a new random seed
      responses:
        "200":
          description: Dashboard summary after reseed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /demo/simulate-days:
    post:
      operationId: simulateDays
      tags: [demo]
      summary: Simulate additional days of product activity for existing prospects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateDaysInput"
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulateDaysResult"

  /demo/recalculate:
    post:
      operationId: recalculateAssessments
      tags: [demo]
      summary: Recalculate all research assessments using the current hypothesis
      responses:
        "200":
          description: Recalculation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecalculationResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Archetype:
      type: string
      enum:
        - rapid_team_activator
        - enterprise_evaluator
        - solo_builder
        - stalled_implementer
        - returning_evaluator
        - converted_account

    ArchetypeInfo:
      type: object
      required: [key, label, description]
      properties:
        key:
          $ref: "#/components/schemas/Archetype"
        label:
          type: string
        description:
          type: string

    OutreachPriority:
      type: string
      enum: [High, Medium, Low, Suppress]

    GtmSignalStatus:
      type: string
      enum:
        - Researching
        - Ready for Generation
        - Generated
        - Needs Review
        - Regeneration Requested
        - Regenerated
        - Approved
        - Rejected
        - Paused
        - Sent
        - Replied

    Company:
      type: object
      required:
        - id
        - name
        - domain
        - industry
        - employeeCount
        - employeeRange
        - fundingStage
        - latestFundingDate
        - fundingAmount
        - headquarters
        - productCategory
        - technologyContext
        - growthSignal
        - icpFitScore
        - createdAt
      properties:
        id: { type: integer }
        name: { type: string }
        domain: { type: string }
        industry: { type: array, items: { type: string } }
        employeeCount: { type: integer }
        employeeRange: { type: string }
        fundingStage: { type: string }
        latestFundingDate: { type: ["string", "null"], format: date }
        fundingAmount: { type: ["integer", "null"] }
        headquarters: { type: ["string", "null"] }
        productCategory: { type: array, items: { type: string } }
        technologyContext: { type: array, items: { type: string } }
        growthSignal: { type: string }
        icpFitScore: { type: number }
        createdAt: { type: string, format: date-time }

    Person:
      type: object
      required:
        - id
        - firstName
        - lastName
        - email
        - profileUrl
        - title
        - department
        - seniority
        - persona
        - purchaseRole
        - startDate
        - companyId
        - archetype
        - contactPriority
        - signupDate
        - lifecycleStage
      properties:
        id: { type: integer }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        profileUrl: { type: string }
        title: { type: string }
        department: { type: string }
        seniority: { type: string }
        persona: { type: string }
        purchaseRole: { type: string }
        startDate: { type: string, format: date-time }
        companyId: { type: integer }
        archetype:
          $ref: "#/components/schemas/Archetype"
        contactPriority: { type: string }
        signupDate: { type: string, format: date-time }
        lifecycleStage: { type: string }

    ProductEvent:
      type: object
      required:
        - id
        - personId
        - companyId
        - sessionId
        - eventName
        - eventCategory
        - occurredAt
        - source
        - properties
      properties:
        id: { type: integer }
        personId: { type: integer }
        companyId: { type: integer }
        sessionId: { type: string }
        eventName: { type: string }
        eventCategory: { type: string }
        occurredAt: { type: string, format: date-time }
        source: { type: string }
        properties:
          type: object
          additionalProperties: true

    BehavioralTrail:
      type: object
      required:
        - id
        - personId
        - companyId
        - chronologicalTrail
        - behaviorSummary
        - firstActivationAt
        - lastActivityAt
        - generatedAt
      properties:
        id: { type: integer }
        personId: { type: integer }
        companyId: { type: integer }
        chronologicalTrail:
          type: array
          items: { type: string }
        behaviorSummary: { type: string }
        firstActivationAt: { type: ["string", "null"], format: date-time }
        lastActivityAt: { type: ["string", "null"], format: date-time }
        generatedAt: { type: string, format: date-time }

    SignalWeights:
      type: object
      description: Weight (0-1) applied to each behavioral signal rule when scoring a prospect
      required:
        - applicationWithin24h
        - organizationEnablement
        - teammateInvitesThreshold
        - repeatedSsoDocViews
        - pricingViewsWithoutActivation
        - integrationErrorsThenInactivity
        - returningAfterInactivity
        - subscriptionStart
      properties:
        applicationWithin24h: { type: number }
        organizationEnablement: { type: number }
        teammateInvitesThreshold: { type: number }
        repeatedSsoDocViews: { type: number }
        pricingViewsWithoutActivation: { type: number }
        integrationErrorsThenInactivity: { type: number }
        returningAfterInactivity: { type: number }
        subscriptionStart: { type: number }

    MessagingGuidance:
      type: object
      description: Recommended outreach angle guidance keyed by archetype
      additionalProperties:
        type: string

    GrowthHypothesis:
      type: object
      required:
        - id
        - version
        - title
        - description
        - signalWeights
        - messagingGuidance
        - knownLimitations
        - effectiveAt
        - updatedAt
      properties:
        id: { type: integer }
        version: { type: string }
        title: { type: string }
        description: { type: string }
        signalWeights:
          $ref: "#/components/schemas/SignalWeights"
        messagingGuidance:
          $ref: "#/components/schemas/MessagingGuidance"
        knownLimitations: { type: string }
        effectiveAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    GrowthHypothesisInput:
      type: object
      required: [title, description, signalWeights, messagingGuidance, knownLimitations]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        signalWeights:
          $ref: "#/components/schemas/SignalWeights"
        messagingGuidance:
          $ref: "#/components/schemas/MessagingGuidance"
        knownLimitations: { type: string }

    AssessmentScoreChange:
      type: object
      required:
        - personId
        - personName
        - companyName
        - previousPriority
        - newPriority
        - previousOutreachPriority
        - newOutreachPriority
      properties:
        personId: { type: integer }
        personName: { type: string }
        companyName: { type: string }
        previousPriority: { type: number }
        newPriority: { type: number }
        previousOutreachPriority:
          $ref: "#/components/schemas/OutreachPriority"
        newOutreachPriority:
          $ref: "#/components/schemas/OutreachPriority"

    RecalculationResult:
      type: object
      required: [hypothesisVersion, updatedAssessmentsCount, changes]
      properties:
        hypothesisVersion: { type: string }
        updatedAssessmentsCount: { type: integer }
        changes:
          type: array
          items:
            $ref: "#/components/schemas/AssessmentScoreChange"

    GrowthHypothesisSaveResult:
      type: object
      required: [hypothesis, recalculation]
      properties:
        hypothesis:
          $ref: "#/components/schemas/GrowthHypothesis"
        recalculation:
          $ref: "#/components/schemas/RecalculationResult"

    ResearchAssessment:
      type: object
      required:
        - id
        - personId
        - companyId
        - hypothesisVersion
        - icpFitScore
        - personaFitScore
        - activationScore
        - collaborationScore
        - enterpriseIntentScore
        - purchaseIntentScore
        - churnRiskScore
        - outreachPriority
        - recommendedAngle
        - rationale
        - riskNotes
        - generatedAt
      properties:
        id: { type: integer }
        personId: { type: integer }
        companyId: { type: integer }
        hypothesisVersion: { type: string }
        icpFitScore: { type: number }
        personaFitScore: { type: number }
        activationScore: { type: number }
        collaborationScore: { type: number }
        enterpriseIntentScore: { type: number }
        purchaseIntentScore: { type: number }
        churnRiskScore: { type: number }
        outreachPriority:
          $ref: "#/components/schemas/OutreachPriority"
        recommendedAngle: { type: string }
        rationale: { type: string }
        riskNotes: { type: string }
        generatedAt: { type: string, format: date-time }

    ProspectListItem:
      type: object
      required:
        - personId
        - firstName
        - lastName
        - title
        - companyId
        - companyName
        - archetype
        - icpFitScore
        - activationScore
        - enterpriseIntentScore
        - churnRiskScore
        - outreachPriority
        - outreachStatus
        - triggeredEventTypes
      properties:
        personId: { type: integer }
        firstName: { type: string }
        lastName: { type: string }
        title: { type: string }
        department: { type: string }
        companyId: { type: integer }
        companyName: { type: string }
        archetype:
          $ref: "#/components/schemas/Archetype"
        icpFitScore: { type: number }
        activationScore: { type: number }
        enterpriseIntentScore: { type: number }
        churnRiskScore: { type: number }
        outreachPriority:
          $ref: "#/components/schemas/OutreachPriority"
        outreachStatus:
          type: ["string", "null"]
        triggeredEventTypes:
          type: array
          items: { type: string }

    ProspectDetail:
      type: object
      required:
        - person
        - company
        - events
        - behavioralTrail
        - researchAssessment
        - gtmSignal
      properties:
        person:
          $ref: "#/components/schemas/Person"
        company:
          $ref: "#/components/schemas/Company"
        events:
          type: array
          items:
            $ref: "#/components/schemas/ProductEvent"
        behavioralTrail:
          $ref: "#/components/schemas/BehavioralTrail"
        researchAssessment:
          $ref: "#/components/schemas/ResearchAssessment"
        gtmSignal:
          oneOf:
            - $ref: "#/components/schemas/GtmSignal"
            - type: "null"

    GtmSignal:
      type: object
      required:
        - id
        - personId
        - companyId
        - sourceSignal
        - behavioralTrail
        - behaviorSummary
        - researchNotes
        - outreachAngle
        - hypothesisVersion
        - promptVersion
        - status
        - exportedToAttio
        - attioSyncStatus
        - attioCompanyRecordId
        - attioPersonRecordId
        - attioGtmSignalRecordId
        - attioPersonWebUrl
        - attioSyncError
        - attioSyncedAt
        - generationStatus
        - generationError
        - agentConfidence
        - outreachEmailSubject
        - outreachEmailBody
        - authProblemAngle
        - createdAt
      properties:
        id: { type: integer }
        personId: { type: integer }
        companyId: { type: integer }
        sourceSignal: { type: string }
        behavioralTrail:
          type: array
          items: { type: string }
        behaviorSummary: { type: string }
        researchNotes: { type: string }
        authProblemAngle: { type: ["string", "null"] }
        outreachAngle: { type: string }
        hypothesisVersion: { type: string }
        promptVersion: { type: string }
        status:
          $ref: "#/components/schemas/GtmSignalStatus"
        exportedToAttio: { type: boolean }
        attioSyncStatus:
          $ref: "#/components/schemas/AttioSyncStatus"
        attioCompanyRecordId: { type: ["string", "null"] }
        attioPersonRecordId: { type: ["string", "null"] }
        attioGtmSignalRecordId: { type: ["string", "null"] }
        attioPersonWebUrl: { type: ["string", "null"] }
        attioSyncError: { type: ["string", "null"] }
        attioSyncedAt: { type: ["string", "null"], format: date-time }
        generationStatus:
          $ref: "#/components/schemas/GenerationStatus"
        generationError: { type: ["string", "null"] }
        agentConfidence:
          oneOf:
            - $ref: "#/components/schemas/AgentConfidence"
            - type: "null"
        outreachEmailSubject: { type: string }
        outreachEmailBody: { type: string }
        createdAt: { type: string, format: date-time }

    GtmSignalListItem:
      type: object
      required:
        - id
        - personId
        - personName
        - companyId
        - companyName
        - sourceSignal
        - outreachPriority
        - outreachAngle
        - status
        - attioSyncStatus
        - attioPersonWebUrl
        - attioSyncError
        - generationStatus
        - generationError
        - createdAt
      properties:
        id: { type: integer }
        personId: { type: integer }
        personName: { type: string }
        companyId: { type: integer }
        companyName: { type: string }
        sourceSignal: { type: string }
        outreachPriority:
          $ref: "#/components/schemas/OutreachPriority"
        outreachAngle: { type: string }
        status:
          $ref: "#/components/schemas/GtmSignalStatus"
        attioSyncStatus:
          $ref: "#/components/schemas/AttioSyncStatus"
        generationStatus:
          $ref: "#/components/schemas/GenerationStatus"
        generationError:
          oneOf:
            - type: string
            - type: "null"
        attioPersonWebUrl:
          oneOf:
            - type: string
            - type: "null"
        attioSyncError:
          oneOf:
            - type: string
            - type: "null"
        createdAt: { type: string, format: date-time }

    GtmSignalInput:
      type: object
      required: [personId]
      properties:
        personId: { type: integer }

    GtmSignalUpdate:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/GtmSignalStatus"

    AttioSyncStatus:
      type: string
      enum: [not_synced, synced, error]

    GenerationStatus:
      type: string
      enum: [pending, generated, failed]

    AgentConfidence:
      type: string
      enum: [low, medium, high]

    AttioRecordPayload:
      type: object
      required: [objectSlug, values]
      properties:
        objectSlug: { type: string }
        values:
          type: object
          additionalProperties: true

    AttioExportPreview:
      type: object
      required: [company, person, gtmSignal]
      properties:
        company:
          $ref: "#/components/schemas/AttioRecordPayload"
        person:
          $ref: "#/components/schemas/AttioRecordPayload"
        gtmSignal:
          $ref: "#/components/schemas/AttioRecordPayload"
        generativeEmail:
          oneOf:
            - $ref: "#/components/schemas/AttioRecordPayload"
            - type: "null"

    DashboardSummary:
      type: object
      required:
        - companies
        - people
        - totalEvents
        - activatedAccounts
        - highPriorityProspects
        - enterpriseEvaluators
        - atRiskImplementers
        - convertedAccounts
        - currentHypothesisVersion
      properties:
        companies: { type: integer }
        people: { type: integer }
        totalEvents: { type: integer }
        activatedAccounts: { type: integer }
        highPriorityProspects: { type: integer }
        enterpriseEvaluators: { type: integer }
        atRiskImplementers: { type: integer }
        convertedAccounts: { type: integer }
        currentHypothesisVersion: { type: string }

    GenerateProspectInput:
      type: object
      required: [archetype]
      properties:
        archetype:
          $ref: "#/components/schemas/Archetype"

    GenerateBatchInput:
      type: object
      properties:
        count:
          type: integer
          minimum: 1
          maximum: 50
          default: 10

    GenerateBatchResult:
      type: object
      required: [generated, prospects]
      properties:
        generated: { type: integer }
        prospects:
          type: array
          items:
            $ref: "#/components/schemas/ProspectListItem"

    SimulateDaysInput:
      type: object
      properties:
        days:
          type: integer
          minimum: 1
          maximum: 30
          default: 7

    SimulateDaysResult:
      type: object
      required: [eventsAdded, daysSimulated, trailsUpdated]
      properties:
        eventsAdded: { type: integer }
        daysSimulated: { type: integer }
        trailsUpdated: { type: integer }
